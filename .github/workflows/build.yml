name: Build

on: push

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7
      - name: Use Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24.x
          cache: yarn
      - run: corepack enable
      - run: yarn install --frozen-lockfile
      - run: make verify

  react-compatibility:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - react: 16.8.6
            react-types: 16
            testing-library: 12.1.5
          - react: 17.0.2
            react-types: 17
            testing-library: 12.1.5
          - react: 18.3.1
            react-types: 18
            testing-library: 16.3.2
          - react: 19.2.8
            react-types: 19
            testing-library: 16.3.2

    steps:
      - uses: actions/checkout@v7
      - name: Use Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24.x
          cache: yarn
      - run: corepack enable
      - run: yarn install --frozen-lockfile
      - name: Install React compatibility version
        run: >-
          yarn add --dev --ignore-scripts --no-lockfile
          react@${{ matrix.react }}
          react-dom@${{ matrix.react }}
          @types/react@${{ matrix.react-types }}
          @types/react-dom@${{ matrix.react-types }}
          @testing-library/react@${{ matrix.testing-library }}
      - run: make typecheck test
